# GoReleaser configuration — https://goreleaser.com
# Validate:  goreleaser check
# Dry run:   goreleaser release --snapshot --clean
version: 2

project_name: bfeed

builds:
  - id: bfeed
    main: ./cmd/bfeed
    binary: bfeed
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: bfeed
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

# Writes dist/digests.txt (image@sha256 lines) so the release workflow can
# attest image provenance from a reliable source instead of scraping artifacts.json.
docker_digest:
  name_template: "digests.txt"

# dockers_v2 replaces the deprecated dockers+docker_manifests approach.
# goreleaser v2.16 removed `use: podman` from dockers; dockers_v2 uses
# docker buildx (available on GitHub-hosted runners and locally with
# `docker buildx create --use`). The build context contains per-platform
# binaries under linux/amd64/ and linux/arm64/ — Dockerfile.release
# selects the right one via ARG TARGETPLATFORM.
dockers_v2:
  - id: bfeed
    dockerfile: Dockerfile.release
    platforms:
      - linux/amd64
      - linux/arm64
    images:
      - "ghcr.io/bcrisp4/bfeed"
    tags:
      # Floating tags render empty on prereleases ({{.Prerelease}} non-empty) —
      # goreleaser silently drops empty tags, so v1.2.3-rc1 only gets :1.2.3-rc1.
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}{{ .Major }}.{{ .Minor }}{{ end }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    labels:
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "https://github.com/bcrisp4/bfeed"

# Release notes come from CHANGELOG.md (passed via --release-notes in
# release.yml). GoReleaser loads that file inside the *changelog* pipe, so the
# pipe must stay enabled — `changelog.disable: true` would skip it and leave the
# release body empty even with --release-notes set. The flag takes precedence
# over commit-based generation, so no auto changelog is produced. See
# docs/changelog.md.

release:
  github:
    owner: bcrisp4
    name: bfeed
  prerelease: auto
