name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions: {}

jobs:
  goreleaser:
    name: binaries + image + github release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create the release, upload assets
      packages: write      # push image to GHCR
      id-token: write      # OIDC for keyless attestation
      attestations: write  # write attestations to GitHub
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum

      # Registers QEMU binfmt handlers so buildx can build the arm64 (COPY-only) image.
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      # dockers_v2 needs a buildx builder with the docker-container driver to
      # build/push a multi-arch manifest; the runner's default builder can't.
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # Extract this tag's section from CHANGELOG.md as the release notes, so the
      # curated changelog is the single source of truth (goreleaser's own
      # commit-based changelog is disabled). Fail fast if the section is missing
      # rather than publishing empty notes — see docs/changelog.md.
      - name: Extract release notes from CHANGELOG.md
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          awk -v hdr="## [${version}]" '
            index($0, hdr) == 1 { grab = 1; next }
            grab && /^## \[/    { grab = 0 }
            grab                { print }
          ' CHANGELOG.md > notes.md
          if ! grep -q '[^[:space:]]' notes.md; then
            echo "::error::No CHANGELOG.md section found for ${version}. Add '## [${version}] - <date>' before tagging (see docs/changelog.md)."
            exit 1
          fi

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Attest the binary archives (+ SBOMs) listed in checksums.txt.
      - name: Attest binary provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

      # Attest the pushed image(s) from goreleaser's docker_digest output
      # (dist/digests.txt: "image@sha256:… name" lines) — the reliable source.
      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/digests.txt
