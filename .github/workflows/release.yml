name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions: {}

jobs:
  goreleaser:
    name: binaries + image + github release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create the release, upload assets
      packages: write      # push image to GHCR
      id-token: write      # OIDC for keyless attestation
      attestations: write  # write attestations to GitHub
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum

      # Registers QEMU binfmt handlers so buildx can build the arm64 (COPY-only) image.
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Firm: attest the binary archives (and SBOMs) listed in checksums.txt.
      - name: Attest binary provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

      # Best-effort: attest the published manifest-list digest. Non-fatal if the
      # artifacts.json shape changes across goreleaser versions (see spec open-risks).
      - id: digest
        name: Extract manifest digest
        continue-on-error: true
        run: |
          v="$(jq -r '.[] | select(.type=="Docker Image" or .type=="Docker Manifest") | .extra.Digest // empty' dist/artifacts.json | head -n1)"
          echo "value=$v" >> "$GITHUB_OUTPUT"

      - name: Attest image provenance (manifest)
        if: steps.digest.outputs.value != ''
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/bcrisp4/bfeed
          subject-digest: ${{ steps.digest.outputs.value }}
          push-to-registry: true
