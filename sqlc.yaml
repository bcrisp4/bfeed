version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/store/sqlite/migrations"
    queries: "internal/store/sqlite/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/store/sqlite/sqlc"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_pointers_for_null_types: false
        overrides:
          - db_type: "INTEGER"
            go_type: "int64"
